<section class="pb-16">
    <div class="max-w-7xl mx-auto px-6">
        <div class="content-section">
            <h2 class="text-3xl font-bold mb-6 text-center">Get Started</h2>
            <div class="grid md:grid-cols-3 gap-6">
                {% for link in site.data.product_links %}   
                <a href='{{link.url |  replace: "$product$", page.reponame | replace: "$product_lc$", page.product }}' class="text-gray-300 hover:text-primary transition-colors">
                    <span class="text-lg">→</span> {{link.title}}
                </a>
                {% endfor %}
                {% for link in page.links %}   
                <a href="{{link.url}}" class="text-gray-300 hover:text-primary transition-colors">
                    <span class="text-lg">→</span> {{link.title}}
                </a>
                {% endfor %}                  
            </div>
        </div>
    </div>
</section>
